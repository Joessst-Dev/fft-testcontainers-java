name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java: ["17", "21"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven

      # ubuntu-latest ships a running Docker daemon, so the Testcontainers tests
      # talk to the host socket and Ryuk reaps the containers. The emulator image
      # is public, so no registry login is needed.
      - name: Build and test
        run: mvn -B verify
